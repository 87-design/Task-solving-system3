<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="今日のタスク">
<meta name="theme-color" content="#0A8FA3">
<title>今日のタスク</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F0FAFB;--s2:#D7FBFF;--s3:#9FD6DD;--s4:#B8EAF2;
  --bd:#9FD6DD;--bd2:#7CC5D6;--tx:#0D3B45;--tx2:#2A6B7C;
  --tx3:#4A9AAD;--ac:#0A8FA3;--ac2:#076B7C;--dn:#0DB88A;--dng:#D84F3F;
  --card-bg:rgba(255,255,255,.88);
  --shadow:0 2px 12px rgba(10,143,163,.10);
  --shadow-md:0 4px 20px rgba(10,143,163,.14);
  --radius:16px;--radius-sm:12px;--radius-xs:8px;
}
body{
  background:var(--bg);color:var(--tx);margin:0;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
  font-family:-apple-system,'Helvetica Neue',sans-serif;
  -webkit-font-smoothing:antialiased;
  /* iPhone safe area */
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}

/* ── CANVAS LAYERS ── */
.wl{position:fixed;left:0;right:0;bottom:0;z-index:10;pointer-events:none;transition:height 1.4s cubic-bezier(0.4,0,0.2,1);}
.wc{position:absolute;top:0;left:0;width:100%;height:100%;}
#ic{position:fixed;inset:0;z-index:20;pointer-events:none;opacity:0;transition:opacity 1s;}
#ibl{position:fixed;inset:0;z-index:19;display:none;}
#sk{position:fixed;left:0;right:0;bottom:0;z-index:8;pointer-events:none;}
#sl{position:fixed;inset:0;z-index:25;pointer-events:none;display:none;}

/* ── SHATTER BUTTON ── */
#shbtn{
  position:fixed;left:50%;transform:translateX(-50%);top:50%;margin-top:-28px;z-index:30;
  display:none;padding:16px 44px;border-radius:50px;border:none;
  background:var(--ac);color:#fff;font-size:17px;font-weight:600;
  letter-spacing:-.2px;cursor:pointer;
  box-shadow:0 8px 32px rgba(10,143,163,.45);
  animation:bp .45s cubic-bezier(.22,.68,0,1.4);
}
#shbtn:active{transform:translateX(-50%) scale(.96);}
@keyframes bp{from{opacity:0;transform:translateX(-50%) scale(.7);}to{opacity:1;transform:translateX(-50%) scale(1);}}

/* ── MUSIC BUTTON ── */
#musicBtn{
  position:fixed;top:calc(14px + env(safe-area-inset-top));right:16px;z-index:40;
  width:36px;height:36px;border-radius:50%;border:none;
  background:rgba(255,255,255,.75);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:15px;box-shadow:var(--shadow);
  transition:opacity .2s;
}
#musicBtn.muted{opacity:.35;}

/* ── RESET BUTTON ── */
#resetBtn{
  position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));right:16px;z-index:40;
  padding:9px 16px;border-radius:50px;border:none;
  background:rgba(255,255,255,.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:var(--tx2);font-size:12px;font-weight:600;
  letter-spacing:-.1px;cursor:pointer;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:5px;
  transition:transform .15s;
}
#resetBtn:active{transform:scale(.94);}

/* ── CONGRATULATIONS ── */
#congrats{
  position:fixed;inset:0;z-index:60;display:none;flex-direction:column;
  align-items:center;justify-content:center;overflow:hidden;
  background:linear-gradient(180deg,rgba(159,214,221,.97) 0%,rgba(184,234,242,.98) 50%,rgba(215,251,255,1) 100%);
}
#congrats-canvas{position:absolute;inset:0;pointer-events:none;}
.cg-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:14px;padding:0 32px;}
.cg-emoji{font-size:64px;animation:cg-pop .6s cubic-bezier(.22,.68,0,1.4);}
.cg-title{
  font-size:34px;font-weight:700;color:var(--tx);text-align:center;
  letter-spacing:-.5px;line-height:1.15;
  text-shadow:0 2px 20px rgba(10,143,163,.2);
  animation:cg-pop .7s cubic-bezier(.22,.68,0,1.4);
}
.cg-sub{font-size:16px;color:var(--tx2);text-align:center;font-weight:400;animation:cg-pop .8s cubic-bezier(.22,.68,0,1.4);}
@keyframes cg-pop{from{opacity:0;transform:scale(.65) translateY(16px);}to{opacity:1;transform:scale(1) translateY(0);}}
.cg-reset{
  margin-top:20px;padding:16px 48px;border-radius:50px;border:none;
  background:linear-gradient(135deg,#0A8FA3,#0DB88A);color:#fff;
  font-size:17px;font-weight:600;letter-spacing:-.2px;cursor:pointer;
  box-shadow:0 8px 28px rgba(10,143,163,.38);
  animation:cg-pop .9s cubic-bezier(.22,.68,0,1.4);
  transition:transform .15s;
}
.cg-reset:active{transform:scale(.96);}

/* ── MINDSET ── */
.mindset{position:relative;z-index:5;width:100%;padding:16px 16px 0;overflow:hidden;box-sizing:border-box;}
.mindset-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;cursor:pointer;}
.mindset-title{
  font-size:11px;font-weight:600;color:var(--tx3);
  letter-spacing:.8px;text-transform:uppercase;
}
.mindset-toggle{font-size:11px;color:var(--tx3);font-weight:500;}
.mindset-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;width:100%;}
.mindset-card{
  display:flex;align-items:flex-start;gap:8px;
  background:rgba(255,255,255,.7);
  border:1px solid rgba(159,214,221,.5);
  border-radius:var(--radius-sm);padding:10px 11px;
  box-shadow:0 1px 6px rgba(10,143,163,.06);
  min-width:0;overflow:hidden;
}
.mindset-num{
  font-size:10px;font-weight:700;color:var(--ac2);
  background:var(--s3);border-radius:50%;
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.mindset-input{
  flex:1;font-size:12px;border:none;background:transparent;
  color:var(--tx);outline:none;resize:none;
  font-family:-apple-system,'Helvetica Neue',sans-serif;
  line-height:1.5;min-height:18px;overflow:hidden;
}
.mindset-input::placeholder{color:var(--tx3);}

/* ── MAIN ── */
.app{position:relative;z-index:5;width:100%;padding:0 16px calc(88px + env(safe-area-inset-bottom));}

/* ヘッダー */
.hd{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;padding-top:4px;}
.hd h1{font-size:28px;font-weight:700;color:var(--tx);letter-spacing:-.5px;line-height:1;}
.dl{font-size:13px;color:var(--tx3);margin-top:4px;font-weight:400;}

/* ブロックカード */
.tb{
  border-radius:var(--radius);border:none;margin-bottom:12px;
  background:var(--card-bg);
  box-shadow:var(--shadow);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  overflow:hidden;
}
.tbh{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;cursor:pointer;
}
.tbt{display:flex;align-items:center;gap:10px;}
.tbi{font-size:20px;line-height:1;}
.tbn{font-size:15px;font-weight:600;color:var(--tx);letter-spacing:-.2px;}
.tbr{font-size:12px;color:var(--tx3);font-weight:400;margin-left:2px;}
.tbb2{
  font-size:11px;background:var(--s2);color:var(--ac2);
  border-radius:20px;padding:3px 9px;font-weight:600;
  border:1px solid rgba(159,214,221,.6);
}
.tbb{padding:0 16px 14px;border-top:1px solid rgba(159,214,221,.35);}

/* タスク追加欄 */
.ba{display:flex;gap:8px;padding-top:12px;align-items:center;}
.ba input{
  flex:1;font-size:14px;padding:9px 12px;border:none;border-radius:var(--radius-xs);
  background:rgba(215,251,255,.6);color:var(--tx);min-width:0;
  font-family:-apple-system,'Helvetica Neue',sans-serif;
}
.ba input:focus{outline:none;background:rgba(215,251,255,.9);box-shadow:0 0 0 2px rgba(10,143,163,.2);}
.ba input::placeholder{color:var(--tx3);}
.ba select{
  font-size:11px;padding:9px 4px;border:none;border-radius:var(--radius-xs);
  background:rgba(215,251,255,.6);color:var(--tx);max-width:80px;
  font-family:-apple-system,'Helvetica Neue',sans-serif;
}
.mb{
  width:34px;height:34px;border-radius:50%;border:none;
  background:var(--ac);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:18px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(10,143,163,.3);
  transition:transform .15s;
}
.mb:active{transform:scale(.9);}

/* タスク行 */
.tr{
  border-bottom:1px solid rgba(184,234,242,.5);
  user-select:none;position:relative;overflow:hidden;transition:background .2s;
  cursor:pointer;touch-action:manipulation;
}
.tr:last-child{border-bottom:none;}
.tr.dragging{opacity:.35;}
.tr.drag-over{border-top:2px solid var(--ac);}
.tr.c1{background:rgba(10,143,163,.04);}
.tr.c2{background:rgba(10,143,163,.09);}
.tr.c3{background:rgba(10,143,163,.15);}
.tr.c4{background:rgba(10,143,163,.22);}
.tm{display:flex;align-items:flex-start;gap:10px;padding:12px 0 10px;}

/* ドラッグハンドル */
.dh{display:flex;align-items:center;padding-top:3px;cursor:grab;color:rgba(159,214,221,.8);flex-shrink:0;touch-action:none;}

/* チェックボックス（丸） */
.ck{
  width:22px;height:22px;border-radius:50%;
  border:2px solid var(--s3);cursor:pointer;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s cubic-bezier(.22,.68,0,1.4);background:#fff;
}
.ck.done{background:var(--dn);border-color:var(--dn);transform:scale(1.08);}
.ck.done::after{
  content:'';width:6px;height:4px;
  border-left:2px solid #fff;border-bottom:2px solid #fff;
  transform:rotate(-45deg) translateY(-1px);display:block;
}
.tbody{flex:1;min-width:0;cursor:pointer;}
.tn{font-size:15px;line-height:1.4;font-weight:500;letter-spacing:-.1px;}
.tn.done{color:var(--tx3);text-decoration:line-through;font-weight:400;}

/* 優先度バッジ */
.bg{
  font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;
  display:inline-flex;align-items:center;margin-top:5px;letter-spacing:.1px;
}
.br{background:#FDECEA;color:#B03A2E;}
.ba2{background:#FEF3E2;color:#8A5A00;}
.bb{background:#E3F4F8;color:#0A6B80;}
.bg2{background:var(--s2);color:var(--tx2);}

/* プログレスバー */
.pb{height:3px;background:rgba(159,214,221,.35);border-radius:4px;margin-top:7px;overflow:hidden;}
.pbi{height:3px;border-radius:4px;transition:width .45s cubic-bezier(.22,.68,0,1);background:linear-gradient(90deg,var(--dn),#5DD6C0);}
.pc{font-size:11px;color:var(--tx3);margin-top:3px;font-weight:500;}
.ch{font-size:11px;color:var(--ac);margin-top:4px;font-weight:600;letter-spacing:-.1px;}

/* サブタスク */
.sp{padding:4px 0 10px 32px;border-top:1px solid rgba(184,234,242,.4);}
.sr2{display:flex;align-items:center;gap:9px;padding:6px 0;}
.sc{
  width:15px;height:15px;border-radius:4px;
  border:1.5px solid var(--s3);cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;background:#fff;
}
.sc.done{background:var(--dn);border-color:var(--dn);}
.sc.done::after{content:'';width:5px;height:3px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block;}
.sn{font-size:13px;color:var(--tx2);flex:1;font-weight:400;}
.sn.done{color:var(--tx3);text-decoration:line-through;}
.sd{font-size:13px;color:var(--tx3);cursor:pointer;padding:2px 4px;}
.sa{display:flex;gap:8px;margin-top:8px;}
.sa input{
  flex:1;font-size:13px;padding:8px 10px;border:none;
  border-radius:var(--radius-xs);background:rgba(215,251,255,.6);
  color:var(--tx);min-width:0;
  font-family:-apple-system,'Helvetica Neue',sans-serif;
}
.sa input::placeholder{color:var(--tx3);}
.en{font-size:13px;color:var(--tx3);padding:12px 0 4px;text-align:center;}

</style>
</head>
<body>

<div class="wl" id="wl" style="height:0"><canvas class="wc" id="wc"></canvas></div>
<canvas id="ic"></canvas>
<div id="ibl"></div>
<canvas id="sk"></canvas>
<div id="sl"></div>
<button id="shbtn" onclick="shatterIce()">❄️ 割る！</button>
<button id="musicBtn" onclick="toggleMusic()" title="BGM">🎵</button>
<button id="resetBtn" onclick="confirmReset()">🔄 リセット</button>

<!-- CONGRATULATIONS -->
<div id="congrats">
  <canvas id="congrats-canvas"></canvas>
  <div class="cg-content">
    <div class="cg-emoji">🎉</div>
    <div class="cg-title">Congratulations!</div>
    <div class="cg-sub">全タスク完了おめでとう！✨</div>
    <button class="cg-reset" onclick="resetAll()">🔄 新しい一日を始める</button>
  </div>
</div>

<div class="mindset">
  <div class="mindset-header" onclick="toggleMindset()">
    <span class="mindset-title">🧠 今日の意識ポイント</span>
    <span class="mindset-toggle" id="ms-toggle">▲ 閉じる</span>
  </div>
  <div class="mindset-cards" id="ms-cards">
    <div class="mindset-card"><div class="mindset-num">1</div><textarea class="mindset-input" placeholder="意識すること…" rows="2" oninput="autoResize(this);saveMindset()"></textarea></div>
    <div class="mindset-card"><div class="mindset-num">2</div><textarea class="mindset-input" placeholder="意識すること…" rows="2" oninput="autoResize(this);saveMindset()"></textarea></div>
    <div class="mindset-card"><div class="mindset-num">3</div><textarea class="mindset-input" placeholder="意識すること…" rows="2" oninput="autoResize(this);saveMindset()"></textarea></div>
    <div class="mindset-card"><div class="mindset-num">4</div><textarea class="mindset-input" placeholder="意識すること…" rows="2" oninput="autoResize(this);saveMindset()"></textarea></div>
  </div>
</div>

<div class="app">
  <div class="hd"><div><h1>今日のタスク</h1><div class="dl" id="dl"></div></div></div>
  <div id="bc"></div>
</div>

<script>
// ── LocalStorage ──────────────────────────────
const LS_TASKS='todaytasks_tasks',LS_DONE='todaytasks_done',LS_MINDSET='todaytasks_mindset',LS_DATE='todaytasks_date',LS_MUSIC='todaytasks_music';
const todayStr=(()=>{const n=new Date();return`${n.getFullYear()}-${n.getMonth()+1}-${n.getDate()}`;})();
if(localStorage.getItem(LS_DATE)!==todayStr){localStorage.removeItem(LS_TASKS);localStorage.removeItem(LS_DONE);localStorage.setItem(LS_DATE,todayStr);}
const DEFAULT_TASKS={am:[{id:1,text:'朝礼・チームMTG',q:0,done:false,open:false,cr:0,subs:[{id:101,text:'資料確認',done:false},{id:102,text:'議事録準備',done:false}]},{id:2,text:'メールチェック・返信',q:2,done:false,open:false,cr:0,subs:[]}],pm:[{id:3,text:'報告書の作成',q:0,done:false,open:false,cr:0,subs:[{id:201,text:'データ収集',done:false},{id:202,text:'草稿を書く',done:false},{id:203,text:'上司に確認依頼',done:false}]},{id:4,text:'上司にレビュー依頼',q:1,done:false,open:false,cr:0,subs:[]}],night:[{id:5,text:'明日のタスクを整理',q:1,done:false,open:false,cr:0,subs:[]}]};
let tasks=JSON.parse(localStorage.getItem(LS_TASKS)||'null')||JSON.parse(JSON.stringify(DEFAULT_TASKS));
let done=JSON.parse(localStorage.getItem(LS_DONE)||'[]');
let nid=300;
[...Object.values(tasks).flat(),...done].forEach(t=>{nid=Math.max(nid,t.id+1);(t.subs||[]).forEach(s=>nid=Math.max(nid,s.id+1));});

let col={am:false,pm:false,night:false};
let wo=0,ws=0,wt=0,wti=0,wp=0,wraf=null,frozen=false,shards=[];
let leaves=[];
function initLeaves(w){
  const colors=['rgba(80,180,90,.32)','rgba(100,190,70,.28)','rgba(60,170,100,.30)','rgba(120,200,80,.25)','rgba(70,160,120,.28)'];
  leaves=Array.from({length:7},(_,i)=>({
    x:Math.random()*w, yR:0.25+Math.random()*0.55,
    size:9+Math.random()*9, angle:Math.random()*Math.PI*2,
    av:(Math.random()-.5)*.012, vx:(Math.random()-.5)*.4,
    col:colors[i%colors.length], type:i%2
  }));
}
function drawLeaf(ctx,x,y,size,angle,col,type){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  ctx.globalAlpha=0.82;ctx.fillStyle=col;
  ctx.beginPath();
  if(type===0){
    // 楕円の葉
    ctx.ellipse(0,0,size*.5,size*.22,0,0,Math.PI*2);
  } else {
    // とがった葉
    ctx.moveTo(0,-size*.5);ctx.quadraticCurveTo(size*.28,0,0,size*.5);ctx.quadraticCurveTo(-size*.28,0,0,-size*.5);
  }
  ctx.fill();
  // 葉脈
  ctx.globalAlpha=0.25;ctx.strokeStyle='rgba(255,255,255,.9)';ctx.lineWidth=.6;
  ctx.beginPath();ctx.moveTo(type===0?-size*.45:0,type===0?0:-size*.45);ctx.lineTo(type===0?size*.45:0,type===0?0:size*.45);ctx.stroke();
  ctx.restore();
}
let actx=null,reverbNode=null,masterReverb=null;
let bgNodes=[],bgPlaying=false,musicMuted=false;
let msOpen=true;
let cgRaf=null;

function save(){localStorage.setItem(LS_TASKS,JSON.stringify(tasks));localStorage.setItem(LS_DONE,JSON.stringify(done));}
function saveMindset(){const v=[...document.querySelectorAll('.mindset-input')].map(e=>e.value);localStorage.setItem(LS_MINDSET,JSON.stringify(v));}
function loadMindset(){const v=JSON.parse(localStorage.getItem(LS_MINDSET)||'[]');document.querySelectorAll('.mindset-input').forEach((e,i)=>{if(v[i])e.value=v[i];autoResize(e);});}

if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js'));

document.getElementById('dl').textContent=(()=>{const n=new Date();return n.getFullYear()+'年'+(n.getMonth()+1)+'月'+n.getDate()+'日（'+'日月火水木金土'[n.getDay()]+'）';})();

// ── Audio Context ─────────────────────────────
function gc(){
  if(!actx)try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}
  if(actx.state==='suspended')actx.resume();
  return actx;
}
function initAudio(){
  const c=gc();if(!c||bgPlaying)return;
  startBgMusic();
}
document.addEventListener('touchstart',initAudio,{once:true});
document.addEventListener('click',initAudio,{once:true});

// ── Reverb ────────────────────────────────────
function mkReverb(c,dur=3,decay=2){
  const len=c.sampleRate*dur,buf=c.createBuffer(2,len,c.sampleRate);
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}
  const cv=c.createConvolver();cv.buffer=buf;return cv;
}

// ── Echo ──────────────────────────────────────
function mkEcho(c,dt=0.28,fb=0.38){
  const delay=c.createDelay(2);delay.delayTime.value=dt;
  const fbg=c.createGain();fbg.gain.value=fb;
  delay.connect(fbg);fbg.connect(delay);
  return delay;
}

// ── Healing BGM ───────────────────────────────
function startBgMusic(){
  bgPlaying=true;
  const c=gc();if(!c)return;
  const rv=mkReverb(c,5,1.2);
  const master=c.createGain();master.gain.value=musicMuted?0:0.28;
  rv.connect(master);master.connect(c.destination);
  bgNodes=[rv,master];

  // ドローン（ヒーリング周波数 174Hz・261Hz）
  [[174,0.07],[174.6,0.06],[261.6,0.04],[523.2,0.025]].forEach(([f,g])=>{
    const o=c.createOscillator(),gn=c.createGain(),lfo=c.createOscillator(),lg=c.createGain();
    o.type='sine';o.frequency.value=f;
    lfo.frequency.value=0.08+Math.random()*0.06;lg.gain.value=f*0.003;
    lfo.connect(lg);lg.connect(o.frequency);
    gn.gain.value=g;o.connect(gn);gn.connect(rv);
    lfo.start();o.start();bgNodes.push(o,lfo);
  });

  // 風ノイズ
  const nb=c.createBuffer(1,c.sampleRate*3,c.sampleRate),nd=nb.getChannelData(0);
  for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
  const ns=c.createBufferSource();ns.buffer=nb;ns.loop=true;
  const bf=c.createBiquadFilter();bf.type='bandpass';bf.frequency.value=320;bf.Q.value=0.4;
  const ng=c.createGain();ng.gain.value=0.012;
  ns.connect(bf);bf.connect(ng);ng.connect(rv);ns.start();bgNodes.push(ns);

  // 水のせせらぎ（高周波ノイズ）
  const wb=c.createBuffer(1,c.sampleRate*2,c.sampleRate),wd=wb.getChannelData(0);
  for(let i=0;i<wd.length;i++)wd[i]=Math.random()*2-1;
  const ws2=c.createBufferSource();ws2.buffer=wb;ws2.loop=true;
  const wf=c.createBiquadFilter();wf.type='highpass';wf.frequency.value=2800;wf.Q.value=0.3;
  const wg=c.createGain();wg.gain.value=0.008;
  ws2.connect(wf);wf.connect(wg);wg.connect(rv);ws2.start();bgNodes.push(ws2);

  // シンギングボウル（ペンタトニック）
  const notes=[261.6,293.7,329.6,392,440,523.2,587.3,659.3];
  function bell(){
    if(!bgPlaying)return;
    const t=c.currentTime,f=notes[Math.floor(Math.random()*notes.length)];
    [1,2,3].forEach((h,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.type='sine';o.frequency.value=f*h*(1+i*0.001);
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.09/(i+1),t+0.015);
      g.gain.exponentialRampToValueAtTime(0.001,t+3.5+i*0.5);
      o.connect(g);g.connect(rv);o.start(t);o.stop(t+4+i*0.5);
    });
    setTimeout(bell,(2.5+Math.random()*5)*1000);
  }
  bell();

  // 鳥の声（合成）
  function bird(){
    if(!bgPlaying)return;
    const t=c.currentTime,chirps=2+Math.floor(Math.random()*3);
    for(let i=0;i<chirps;i++){
      const o=c.createOscillator(),g=c.createGain();
      const baseF=2200+Math.random()*1400,d=i*0.12;
      o.type='sine';
      o.frequency.setValueAtTime(baseF,t+d);
      o.frequency.exponentialRampToValueAtTime(baseF*1.4,t+d+0.06);
      o.frequency.exponentialRampToValueAtTime(baseF*0.9,t+d+0.12);
      g.gain.setValueAtTime(0,t+d);
      g.gain.linearRampToValueAtTime(0.06,t+d+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+d+0.14);
      o.connect(g);g.connect(rv);o.start(t+d);o.stop(t+d+0.2);
    }
    setTimeout(bird,(6+Math.random()*12)*1000);
  }
  bird();

  window._bgMaster=master;
}

function playCrack(n){

  const out=c.createGain();out.gain.value=1.0;
  rv.connect(echo);echo.connect(out);out.connect(c.destination);
  [2400,3600,5000,1800,6500].forEach((f,i)=>{
    const d=i*.016,o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(rv);o.type='triangle';
    o.frequency.setValueAtTime(f*(0.4+iv*.6),t+d);
    o.frequency.exponentialRampToValueAtTime(f*.08,t+d+.18);
    g.gain.setValueAtTime(.25+iv*.12,t+d);
    g.gain.exponentialRampToValueAtTime(.001,t+d+.22);

// ── Water / Wave ──────────────────────────────
function allT(){return[...tasks.am,...tasks.pm,...tasks.night];}
function tot(){return allT().length+done.length;}
function pct(t){if(!t.subs||!t.subs.length)return t.done?100:0;return Math.round(t.subs.filter(s=>s.done).length/t.subs.length*100);}
function ft(bk,id){return tasks[bk]?tasks[bk].find(t=>t.id===id):null;}
function shH(){return shards.length?Math.max(...shards.map(s=>s.ry+s.sh)):0;}
function wPct(){const t=tot();return t?done.length/t:0;}

function updW(){
  if(frozen)return;
  const p=wPct(),vh=window.innerHeight,sh2=shH();
  const h=Math.max(0,Math.round(p*vh)-sh2);
  document.getElementById('wl').style.height=h+'px';
  const cv=document.getElementById('wc');cv.width=cv.offsetWidth||390;cv.height=Math.max(h,1);
  if(wraf)cancelAnimationFrame(wraf);
  if(p>0&&h>0)wave(cv);
  if(p>=1&&!frozen)setTimeout(freeze,500);
}

function wave(cv){
  if(!leaves.length)initLeaves(cv.width);
  function fr(){
    if(frozen)return;
    wo+=.025;wti--;
    if(wti<=0){wt=(Math.random()-.5)*20;wti=80+Math.random()*140|0;}
    ws+=(wt-ws)*.018;wp+=.007;
    const w=cv.width,h=cv.height,ctx=cv.getContext('2d');
    ctx.clearRect(0,0,w,h);
    const g=ctx.createLinearGradient(0,0,0,h);
    g.addColorStop(0,'rgba(159,214,221,.52)');g.addColorStop(.4,'rgba(184,234,242,.48)');g.addColorStop(1,'rgba(215,251,255,.62)');
    ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(0,h);
    for(let x=0;x<=w;x++){const y=8*Math.sin((x/w)*Math.PI*2+wo)+5*Math.sin((x/w)*Math.PI*3+wo*1.4)+ws*Math.sin((x/w)*Math.PI+wp)*.9+14;ctx.lineTo(x,y);}
    ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fill();
    // 水面の光の筋
    ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=1;
    for(let i=0;i<3;i++){
      ctx.beginPath();const yb=h*.15+i*h*.28;
      for(let x=0;x<=w;x++){const y=yb+3*Math.sin((x/w)*Math.PI*4+wo*1.2+i*1.1)+ws*.3*Math.sin((x/w)*Math.PI*2+wp+i);x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
      ctx.stroke();
    }
    // 葉っぱ
    leaves.forEach(lf=>{
      lf.x+=lf.vx+ws*.06;
      lf.angle+=lf.av;
      if(lf.x<-20)lf.x=w+10;
      if(lf.x>w+20)lf.x=-10;
      // 波に乗って上下
      const wy=6*Math.sin((lf.x/w)*Math.PI*2+wo)+4*Math.sin((lf.x/w)*Math.PI*3+wo*1.4);
      const ly=h*lf.yR+wy*.4;
      if(ly>8&&ly<h-4)drawLeaf(ctx,lf.x,ly,lf.size,lf.angle,lf.col,lf.type);
    });
    wraf=requestAnimationFrame(fr);
  }
  wraf=requestAnimationFrame(fr);
}

function freeze(){
  frozen=true;cancelAnimationFrame(wraf);
  const cv=document.getElementById('wc'),ctx=cv.getContext('2d'),w=cv.width,h=cv.height;
  ctx.clearRect(0,0,w,h);
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'rgba(159,214,221,.72)');g.addColorStop(1,'rgba(215,251,255,.85)');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

}

function drawIce(cv){
  const ctx=cv.getContext('2d'),w=cv.width,h=cv.height;
  const g=ctx.createLinearGradient(0,0,w,h);
  g.addColorStop(0,'rgba(215,251,255,.82)');g.addColorStop(.5,'rgba(184,234,242,.74)');g.addColorStop(1,'rgba(159,214,221,.86)');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(255,255,255,.72)';ctx.lineWidth=1;
  for(let i=0;i<55;i++){
    const ox=Math.random()*w,oy=Math.random()*h,br=3+Math.random()*4|0;
    for(let b=0;b<br;b++){
      const a=(b/br)*Math.PI*2+Math.random()*.4,l=15+Math.random()*95;
      ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+Math.cos(a)*l,oy+Math.sin(a)*l);ctx.stroke();
      for(let s=0;s<3;s++){
        const sf=.25+s*.25,sa=a+(Math.random()-.5)*1.4;
        ctx.beginPath();ctx.moveTo(ox+Math.cos(a)*l*sf,oy+Math.sin(a)*l*sf);ctx.lineTo(ox+Math.cos(a)*l*sf+Math.cos(sa)*l*.35,oy+Math.sin(a)*l*sf+Math.sin(sa)*l*.35);ctx.stroke();
      }
    }
  }
}

function drawSK(){
  const cv=document.getElementById('sk'),w=window.innerWidth;
  if(!shards.length){cv.style.height='0';return;}
  const maxH=Math.max(...shards.map(s=>s.ry+s.sh))+10;

    ctx.save();ctx.translate(s.rx+s.sw/2,s.ry+s.sh/2);ctx.rotate(s.rr);

    ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=.7;

    ctx.restore();
  });

function showCongrats(){

  const cv=document.getElementById('congrats-canvas');
  cv.width=window.innerWidth;cv.height=window.innerHeight;

    x:Math.random()*cv.width,y:Math.random()*cv.height,
    r:2+Math.random()*4,v:0.4+Math.random()*1.2,
    a:Math.random()*Math.PI*2,drift:(Math.random()-.5)*0.5,op:0.5+Math.random()*0.5
  }));
  function drawFlake(ctx,x,y,r){
    for(let i=0;i<6;i++){
      ctx.save();ctx.translate(x,y);ctx.rotate(i*Math.PI/3);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,r);
      ctx.moveTo(0,r*.4);ctx.lineTo(r*.25,r*.6);
      ctx.moveTo(0,r*.4);ctx.lineTo(-r*.25,r*.6);
      ctx.stroke();ctx.restore();
    }
  }
  function animFlakes(){
    cgRaf=requestAnimationFrame(animFlakes);
    ctx.clearRect(0,0,cv.width,cv.height);

    const g=ctx.createLinearGradient(0,cv.height*.7,0,cv.height);

  animFlakes();

  playCongratsSound();

// ── crack lines ───────────────────────────────
function clines(iv){
  const ls=[],or=[[114,24],[228,14],[57,29]],cnt=3+iv*9|0;
  for(let i=0;i<cnt;i++){
    const ox=or[i%3][0]+(Math.random()-.5)*60,oy=or[i%3][1]+(Math.random()-.5)*20;
    const a=Math.random()*Math.PI*2,l=20+Math.random()*65*iv;
    const ex=ox+Math.cos(a)*l,ey=oy+Math.sin(a)*l,mx=ox+Math.cos(a)*l*.5+(Math.random()-.5)*15,my=oy+Math.sin(a)*l*.5+(Math.random()-.5)*10;
    ls.push(`<path d="M${ox},${oy} Q${mx},${my} ${ex},${ey}" stroke="#0A8FA3" stroke-width="${.8+iv*1.2}" fill="none" opacity="${.35+iv*.45}"/>`);
    if(iv>.3&&Math.random()>.5){const a2=a+.8+(Math.random()-.5)*1,l2=10+Math.random()*35*iv;ls.push(`<path d="M${mx},${my} L${mx+Math.cos(a2)*l2},${my+Math.sin(a2)*l2}" stroke="#0A8FA3" stroke-width=".7" fill="none" opacity="${.2+iv*.35}"/>`);}
  }
  return ls.join('');
}

// ── Task logic ────────────────────────────────
function tap(bk,id){
  const t=ft(bk,id);if(!t)return;
  const hs=t.subs&&t.subs.length;
  if(hs&&!t.subs.every(s=>s.done))return;
  if(!hs&&!t.done)return;
  t.cr=Math.min((t.cr||0)+1,4);
  if(t.cr<4){playCrack(t.cr);save();rb();}
  else{
    playSmash();
    const el=document.querySelector(`.tr[data-id="${id}"]`);
    if(el){el.style.transition='transform .35s cubic-bezier(.55,-.5,.7,1),opacity .35s';el.style.transform='translateY(20px) scale(.93)';el.style.opacity='0';setTimeout(()=>{tasks[bk]=tasks[bk].filter(t=>t.id!==id);done.push({...t});save();ra();updW();},340);}
    else{tasks[bk]=tasks[bk].filter(t=>t.id!==id);done.push({...t});save();ra();updW();}
  }
}

function ra(){rb();rd();}
function rb(){
  const bc=document.getElementById('bc');bc.innerHTML='';
  BL.forEach(b=>{
    const bt=tasks[b.k];
    const dc=bt.filter(t=>t.subs&&t.subs.length?t.subs.every(s=>s.done):t.done).length;
    const div=document.createElement('div');div.className='tb';
    let body='';
    if(!col[b.k]){
      let rows=!bt.length?'<div class="en">タスクなし</div>':bt.map(t=>{
        const p=pct(t),hs=t.subs&&t.subs.length,cv=t.cr||0,iv=cv/4,rdy=hs?t.subs.every(s=>s.done):t.done;
        const sr=(t.subs||[]).map(s=>`<div class="sr2"><div class="sc ${s.done?'done':''}" onclick="tgS('${b.k}',${t.id},${s.id})"></div><span class="sn ${s.done?'done':''}">${s.text}</span><i class="ti ti-x sd" onclick="dlS('${b.k}',${t.id},${s.id})"></i></div>`).join('');
        const sp2=t.open?`<div class="sp">${sr}<div class="sa"><input type="text" id="si-${t.id}" placeholder="ミニタスクを追加..."/><button class="mb" onclick="addS('${b.k}',${t.id})"><i class="ti ti-plus"></i></button></div></div>`:'';
        const ph=hs?`<div class="pb"><div class="pbi" style="width:${p}%"></div></div><div class="pc">${p}%</div>`:'';
        const hint=rdy&&!cv?`<div class="ch">👆 タップでひび割れ開始</div>`:rdy&&cv<4?`<div class="ch">あと${4-cv}回で砕ける！</div>`:'';
        const csv=cv?`<svg style="position:absolute;inset:0;pointer-events:none;z-index:2;" width="100%" height="100%" viewBox="0 0 380 56" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">${clines(iv)}</svg>`:'';
        return`<div class="tr ${cv?'c'+cv:''}" data-block="${b.k}" data-id="${t.id}" onclick="tap('${b.k}',${t.id})">${csv}<div class="tm"><div class="dh" onclick="event.stopPropagation()"><i class="ti ti-grip-vertical" style="font-size:15px;"></i></div><div class="ck ${t.done?'done':''}" onclick="event.stopPropagation();tgT('${b.k}',${t.id})"></div><div class="tbody" onclick="event.stopPropagation();tap('${b.k}',${t.id})"><span class="tn ${(t.done||(hs&&t.subs.every(s=>s.done)))?'done':''}">${t.text}</span><br><span class="bg ${Q[t.q].b}">${Q[t.q].l}</span>${ph}${hint}</div><div style="display:flex;align-items:center;gap:4px;flex-shrink:0;z-index:3;position:relative;"><i class="ti ti-${t.open?'chevron-up':'chevron-down'}" style="font-size:14px;color:var(--tx3);cursor:pointer;padding:5px;" onclick="event.stopPropagation();tgO('${b.k}',${t.id})"></i><i class="ti ti-trash" style="font-size:14px;color:var(--tx3);cursor:pointer;padding:5px;" onclick="event.stopPropagation();dlT('${b.k}',${t.id})"></i></div></div>${sp2}</div>`;
      }).join('');
      body=`<div class="tbb"><div id="list-${b.k}">${rows}</div><div class="ba"><input type="text" id="inp-${b.k}" placeholder="${b.n}のタスクを追加..."/><select id="sel-${b.k}"><option value="0">🔴 重要・急ぎ</option><option value="1">🟡 重要・後で</option><option value="2">🔵 急ぎ・軽め</option><option value="3">⚪ いつか</option></select><button class="mb" onclick="addT('${b.k}')"><i class="ti ti-plus"></i></button></div></div>`;
    }
    div.innerHTML=`<div class="tbh" onclick="tgCol('${b.k}')"><div class="tbt"><span class="tbi">${b.i}</span><div><span class="tbn">${b.n}</span><span class="tbr">${b.t}</span></div></div><div style="display:flex;align-items:center;gap:8px;"><span class="tbb2">${dc}/${bt.length}</span><i class="ti ti-${col[b.k]?'chevron-right':'chevron-down'}" style="font-size:14px;color:var(--tx3);"></i></div></div>${body}`;
    bc.appendChild(div);
    if(!col[b.k]){
      const inp=document.getElementById('inp-'+b.k);
      if(inp)inp.addEventListener('keydown',e=>{if(e.key==='Enter')addT(b.k);});
      bt.forEach(t=>{const si=document.getElementById('si-'+t.id);if(si)si.addEventListener('keydown',e=>{if(e.key==='Enter')addS(b.k,t.id);});});
      drag(b.k);
    }
  });
}

function rd(){}

function tgO(bk,id){const t=ft(bk,id);if(t)t.open=!t.open;save();rb();}
function tgT(bk,id){const t=ft(bk,id);if(!t)return;if(t.subs&&t.subs.length){const a=t.subs.every(s=>s.done);t.subs.forEach(s=>s.done=!a);t.done=!a;}else t.done=!t.done;save();ra();}
function dlT(bk,id){tasks[bk]=tasks[bk].filter(t=>t.id!==id);save();ra();updW();}
function addT(bk){const i=document.getElementById('inp-'+bk),s=document.getElementById('sel-'+bk),tx=i.value.trim();if(!tx)return;tasks[bk].push({id:nid++,text:tx,q:parseInt(s.value),done:false,open:false,cr:0,subs:[]});i.value='';save();ra();updW();}
function tgS(bk,tid,sid){const t=ft(bk,tid);if(!t)return;const s=t.subs.find(s=>s.id===sid);if(s)s.done=!s.done;t.done=t.subs.every(s=>s.done);save();ra();}
function dlS(bk,tid,sid){const t=ft(bk,tid);if(!t)return;t.subs=t.subs.filter(s=>s.id!==sid);save();ra();}
function addS(bk,tid){const i=document.getElementById('si-'+tid),tx=i.value.trim();if(!tx)return;const t=ft(bk,tid);if(!t)return;t.subs.push({id:nid++,text:tx,done:false});i.value='';save();ra();}
function tgCol(k){col[k]=!col[k];rb();}
function toggleMindset(){msOpen=!msOpen;document.getElementById('ms-cards').style.display=msOpen?'grid':'none';document.getElementById('ms-toggle').textContent=msOpen?'▲ 閉じる':'▼ 開く';}
function autoResize(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}

const Q=[{l:'重要・急ぎ',b:'br',c:'#FDECEA'},{l:'重要・後で',b:'ba2',c:'#FEF3E2'},{l:'急ぎ・軽め',b:'bb',c:'#E3F4F8'},{l:'いつか',b:'bg2',c:'#EDF8FA'}];
const BL=[{k:'am',i:'🌅',n:'午前',t:'〜12:00'},{k:'pm',i:'☀️',n:'午後',t:'12:00〜18:00'},{k:'night',i:'🌙',n:'夜',t:'18:00〜'}];

function drag(bk){
  const list=document.getElementById('list-'+bk);if(!list)return;
  list.querySelectorAll('.tr').forEach(row=>{
    const h=row.querySelector('.dh');if(!h)return;
    h.addEventListener('mousedown',e=>{e.stopPropagation();sd(e,row,bk,false);});
    h.addEventListener('touchstart',e=>{e.stopPropagation();sd(e,row,bk,true);},{passive:false});
  });
}
function sd(e,row,bk,isT){
  e.preventDefault();const id=parseInt(row.dataset.id);row.classList.add('dragging');
  const mv=isT?'touchmove':'mousemove',up=isT?'touchend':'mouseup';
  function onM(ev){const y=isT?ev.touches[0].clientY:ev.clientY;const l=document.getElementById('list-'+bk);if(!l)return;const sb=[...l.querySelectorAll('.tr:not(.dragging)')];sb.forEach(s=>s.classList.remove('drag-over'));for(const s of sb){const r=s.getBoundingClientRect();if(y<r.top+r.height/2){s.classList.add('drag-over');break;}}}
  function onU(){document.removeEventListener(mv,onM);document.removeEventListener(up,onU);row.classList.remove('dragging');const l=document.getElementById('list-'+bk);if(l){const sb=[...l.querySelectorAll('.tr:not(.dragging)')],ov=sb.find(s=>s.classList.contains('drag-over'));sb.forEach(s=>s.classList.remove('drag-over'));const arr=tasks[bk],fi=arr.findIndex(t=>t.id===id);if(ov){const ti=arr.findIndex(t=>t.id===parseInt(ov.dataset.id));if(fi!==-1&&ti!==-1&&fi!==ti){const[item]=arr.splice(fi,1);arr.splice(ti,0,item);}}}save();ra();}
  document.addEventListener(mv,onM);document.addEventListener(up,onU);
}

window.addEventListener('resize',()=>{if(!frozen)updW();drawSK();});
ra();updW();drawSK();loadMindset();
</script>
</body>
</html>
