<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="今日のタスク">
<meta name="theme-color" content="#0A8FA3">
<title>今日のタスク</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#F0FAFB;--s2:#D7FBFF;--s3:#9FD6DD;--s4:#B8EAF2;--bd:#9FD6DD;--bd2:#7CC5D6;--tx:#0D3B45;--tx2:#2A6B7C;--tx3:#4A9AAD;--ac:#0A8FA3;--ac2:#076B7C;--dn:#0DB88A;--dng:#D84F3F;}
body{background:var(--bg);color:var(--tx);margin:0;overflow-x:hidden;-webkit-tap-highlight-color:transparent;padding-bottom:env(safe-area-inset-bottom);}

.wl{position:fixed;left:0;right:0;bottom:0;z-index:10;pointer-events:none;transition:height 1.4s cubic-bezier(0.4,0,0.2,1);}
.wc{position:absolute;top:0;left:0;width:100%;height:100%;}
#ic{position:fixed;inset:0;z-index:20;pointer-events:none;opacity:0;transition:opacity 1s;}
#ibl{position:fixed;inset:0;z-index:19;display:none;}
#sk{position:fixed;left:0;right:0;bottom:0;z-index:8;pointer-events:none;}
#sl{position:fixed;inset:0;z-index:25;pointer-events:none;display:none;}
#shbtn{position:fixed;left:50%;transform:translateX(-50%);top:50%;margin-top:-36px;z-index:30;display:none;padding:18px 48px;border-radius:40px;border:none;background:#0A8FA3;color:#fff;font-size:20px;font-weight:700;cursor:pointer;box-shadow:0 6px 28px rgba(10,143,163,.55);animation:bp .5s cubic-bezier(.22,.68,0,1.4);}
@keyframes bp{from{opacity:0;transform:translateX(-50%) scale(.7);}to{opacity:1;transform:translateX(-50%) scale(1);}}

/* 音楽ボタン */
#musicBtn{position:fixed;top:12px;right:14px;z-index:40;width:34px;height:34px;border-radius:50%;border:1.5px solid var(--bd2);background:rgba(215,251,255,.85);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(10,143,163,.2);backdrop-filter:blur(4px);}
#musicBtn.muted{opacity:.45;}

/* CONGRATULATIONS */
#congrats{position:fixed;inset:0;z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(159,214,221,.97) 0%,rgba(184,234,242,.98) 50%,rgba(215,251,255,1) 100%);overflow:hidden;}
#congrats-canvas{position:absolute;inset:0;pointer-events:none;}
.cg-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:16px;padding:0 24px;}
.cg-emoji{font-size:56px;animation:cg-pop .6s cubic-bezier(.22,.68,0,1.4);}
.cg-title{font-size:32px;font-weight:800;color:var(--tx);text-align:center;line-height:1.2;text-shadow:0 2px 16px rgba(10,143,163,.25);animation:cg-pop .7s cubic-bezier(.22,.68,0,1.4);}
.cg-sub{font-size:15px;color:var(--tx2);text-align:center;animation:cg-pop .8s cubic-bezier(.22,.68,0,1.4);}
@keyframes cg-pop{from{opacity:0;transform:scale(.6) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
.cg-reset{margin-top:16px;padding:16px 48px;border-radius:40px;border:none;background:linear-gradient(135deg,#0A8FA3,#0DB88A);color:#fff;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 6px 24px rgba(10,143,163,.45);animation:cg-pop .9s cubic-bezier(.22,.68,0,1.4);letter-spacing:.5px;}
.cg-reset:active{transform:scale(.96);}

/* MINDSET */
.mindset{position:relative;z-index:5;max-width:390px;margin:0 auto;padding:12px 14px 0;}
.mindset-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;cursor:pointer;}
.mindset-title{font-size:11px;font-weight:600;color:var(--tx3);letter-spacing:.7px;text-transform:uppercase;}
.mindset-toggle{font-size:10px;color:var(--tx3);}
.mindset-cards{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:12px;}
.mindset-card{display:flex;align-items:flex-start;gap:6px;background:rgba(215,251,255,.75);border:.5px solid var(--s3);border-radius:9px;padding:7px 9px;}
.mindset-num{font-size:10px;font-weight:700;color:var(--ac2);background:var(--s3);border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.mindset-input{flex:1;font-size:11px;border:none;background:transparent;color:var(--tx);outline:none;resize:none;font-family:inherit;line-height:1.45;min-height:16px;overflow:hidden;}
.mindset-input::placeholder{color:var(--tx3);font-size:10px;}

/* MAIN */
.app{position:relative;z-index:5;max-width:390px;margin:0 auto;padding:0 14px calc(80px + env(safe-area-inset-bottom));}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.hd h1{font-size:18px;font-weight:600;color:var(--tx);}
.dl{font-size:11px;color:var(--tx3);margin-top:2px;}
.tb{border-radius:12px;border:.5px solid var(--bd);margin-bottom:10px;background:rgba(255,255,255,.92);backdrop-filter:blur(4px);}
.tbh{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;}
.tbt{display:flex;align-items:center;gap:7px;}
.tbn{font-size:13px;font-weight:500;color:var(--tx);}
.tbr{font-size:11px;color:var(--tx3);}
.tbb2{font-size:10px;background:var(--s2);color:var(--ac2);border-radius:20px;padding:2px 7px;font-weight:600;border:.5px solid var(--s3);}
.tbb{padding:0 12px 10px;border-top:.5px solid var(--bd);}
.ba{display:flex;gap:5px;padding-top:8px;}
.ba input{flex:1;font-size:12px;padding:6px 9px;border:.5px solid var(--bd);border-radius:9px;background:var(--s2);color:var(--tx);min-width:0;}
.ba input:focus{outline:none;border-color:var(--ac);background:#fff;}
.ba input::placeholder{color:var(--tx3);}
.ba select{font-size:11px;padding:6px 3px;border:.5px solid var(--bd);border-radius:9px;background:var(--s2);color:var(--tx);max-width:76px;}
.mb{width:30px;height:30px;border-radius:9px;border:.5px solid var(--bd2);background:var(--s3);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ac2);font-size:17px;flex-shrink:0;}
.tr{border-bottom:.5px solid var(--s4);user-select:none;position:relative;overflow:hidden;transition:background .2s;}
.tr:last-child{border-bottom:none;}
.tr.dragging{opacity:.4;}
.tr.drag-over{border-top:2px solid var(--ac);}
.tr.c1{background:rgba(10,143,163,.05);}
.tr.c2{background:rgba(10,143,163,.11);}
.tr.c3{background:rgba(10,143,163,.18);}
.tr.c4{background:rgba(10,143,163,.24);}
.tm{display:flex;align-items:flex-start;gap:7px;padding:7px 0 5px;}
.dh{display:flex;align-items:center;padding-top:2px;cursor:grab;color:var(--s3);flex-shrink:0;touch-action:none;}
.ck{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--s3);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:#fff;}
.ck.done{background:var(--dn);border-color:var(--dn);}
.ck.done::after{content:'';width:5px;height:3px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block;}
.tbody{flex:1;min-width:0;cursor:pointer;}
.tn{font-size:13px;line-height:1.4;}
.tn.done{color:var(--tx3);text-decoration:line-through;}
.bg{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:500;display:inline-block;margin-top:3px;}
.br{background:#FDECEA;color:#B03A2E;}.ba2{background:#FEF3E2;color:#8A5A00;}.bb{background:#E3F4F8;color:#0A6B80;}.bg2{background:var(--s2);color:var(--tx2);}
.pb{height:4px;background:var(--s3);border-radius:4px;margin-top:5px;overflow:hidden;}
.pbi{height:4px;border-radius:4px;transition:width .4s;background:linear-gradient(90deg,var(--dn),#5DD6C0);}
.pc{font-size:10px;color:var(--tx3);margin-top:2px;}
.ch{font-size:10px;color:var(--ac);margin-top:2px;font-weight:600;}
.sp{padding:4px 0 8px 22px;border-top:.5px dashed var(--s3);}
.sr2{display:flex;align-items:center;gap:7px;padding:4px 0;}
.sc{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--s3);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:#fff;}
.sc.done{background:var(--dn);border-color:var(--dn);}
.sc.done::after{content:'';width:5px;height:3px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block;}
.sn{font-size:12px;color:var(--tx2);flex:1;}
.sn.done{color:var(--tx3);text-decoration:line-through;}
.sd{font-size:12px;color:var(--tx3);cursor:pointer;}
.sa{display:flex;gap:5px;margin-top:5px;}
.sa input{flex:1;font-size:12px;padding:5px 8px;border:.5px solid var(--bd);border-radius:8px;background:var(--s2);color:var(--tx);min-width:0;}
.sa input::placeholder{color:var(--tx3);}
.en{font-size:12px;color:var(--tx3);padding:8px 0 2px;}
.dz{margin-top:24px;padding-bottom:60px;}
.dzh{text-align:center;margin-bottom:16px;}
.dzt{font-size:22px;font-weight:700;color:var(--dn);}
.dzs{font-size:13px;color:var(--tx3);margin-top:4px;}
.dp{display:flex;flex-direction:column;gap:10px;}
.dc{border-radius:14px;padding:14px 16px;font-size:14px;display:flex;align-items:center;gap:12px;animation:fi .5s cubic-bezier(.22,.68,0,1.2);border:1px solid var(--s3);}
@keyframes fi{from{opacity:0;transform:translateY(-14px);}to{opacity:1;transform:translateY(0);}}
.dct{flex:1;font-weight:500;text-decoration:line-through;opacity:.7;color:var(--tx2);}

/* リセットボタン（通常時） */
#resetBtn{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));right:14px;z-index:40;padding:8px 14px;border-radius:20px;border:1.5px solid var(--bd2);background:rgba(215,251,255,.9);color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;backdrop-filter:blur(4px);box-shadow:0 2px 8px rgba(10,143,163,.15);}
#resetBtn:active{transform:scale(.96);}
</style>
</head>
<body>

<div class="wl" id="wl" style="height:0"><canvas class="wc" id="wc"></canvas></div>
<canvas id="ic"></canvas>
<div id="ibl"></div>
<canvas id="sk"></canvas>
<div id="sl"></div>
<button id="shbtn" onclick="shatterIce()">❄️ 割る！</button>
<button id="musicBtn" onclick="toggleMusic()" title="BGM">🎵</button>
<button id="resetBtn" onclick="confirmReset()">🔄 リセット</button>

<!-- CONGRATULATIONS -->
<div id="congrats">
  <canvas id="congrats-canvas"></canvas>
  <div class="cg-content">
    <div class="cg-emoji">🎉</div>
    <div class="cg-title">Congratulations!</div>
    <div class="cg-sub">全タスク完了おめでとう！✨</div>
    <button class="cg-reset" onclick="resetAll()">🔄 新しい一日を始める</button>
  </div>
</div>

<div class="mindset">
  <div class="mindset-header" onclick="toggleMindset()">
    <span class="mindset-title">🧠 今日の意識ポイント</span>
    <span class="mindset-toggle" id="ms-toggle">▲ 閉じる</span>
  </div>
  <div class="mindset-cards" id="ms-cards">
    <div class="mindset-card"><div class="mindset-num">1</div><textarea class="mindset-input" placeholder="意識すること…" rows="2" oninput="autoResize(this);saveMindset()"></textarea></div>
    <div class="mindset-card"><div class="mindset-num">2</div><textarea class="mindset-input" placeholder="意識すること…" rows="2" oninput="autoResize(this);saveMindset()"></textarea></div>
    <div class="mindset-card"><div class="mindset-num">3</div><textarea class="mindset-input" placeholder="意識すること…" rows="2" oninput="autoResize(this);saveMindset()"></textarea></div>
    <div class="mindset-card"><div class="mindset-num">4</div><textarea class="mindset-input" placeholder="意識すること…" rows="2" oninput="autoResize(this);saveMindset()"></textarea></div>
  </div>
</div>

<div class="app">
  <div class="hd"><div><h1>今日のタスク</h1><div class="dl" id="dl"></div></div></div>
  <div id="bc"></div>
  <div class="dz" id="dz" style="display:none">
    <div class="dzh"><div class="dzt" id="dzt">✅ 完了済み</div><div class="dzs" id="dzs"></div></div>
    <div class="dp" id="dp"></div>
  </div>
</div>

<script>
// ── LocalStorage ──────────────────────────────
const LS_TASKS='todaytasks_tasks',LS_DONE='todaytasks_done',LS_MINDSET='todaytasks_mindset',LS_DATE='todaytasks_date',LS_MUSIC='todaytasks_music';
const todayStr=(()=>{const n=new Date();return`${n.getFullYear()}-${n.getMonth()+1}-${n.getDate()}`;})();
if(localStorage.getItem(LS_DATE)!==todayStr){localStorage.removeItem(LS_TASKS);localStorage.removeItem(LS_DONE);localStorage.setItem(LS_DATE,todayStr);}
const DEFAULT_TASKS={am:[{id:1,text:'朝礼・チームMTG',q:0,done:false,open:false,cr:0,subs:[{id:101,text:'資料確認',done:false},{id:102,text:'議事録準備',done:false}]},{id:2,text:'メールチェック・返信',q:2,done:false,open:false,cr:0,subs:[]}],pm:[{id:3,text:'報告書の作成',q:0,done:false,open:false,cr:0,subs:[{id:201,text:'データ収集',done:false},{id:202,text:'草稿を書く',done:false},{id:203,text:'上司に確認依頼',done:false}]},{id:4,text:'上司にレビュー依頼',q:1,done:false,open:false,cr:0,subs:[]}],night:[{id:5,text:'明日のタスクを整理',q:1,done:false,open:false,cr:0,subs:[]}]};
let tasks=JSON.parse(localStorage.getItem(LS_TASKS)||'null')||JSON.parse(JSON.stringify(DEFAULT_TASKS));
let done=JSON.parse(localStorage.getItem(LS_DONE)||'[]');
let nid=300;
[...Object.values(tasks).flat(),...done].forEach(t=>{nid=Math.max(nid,t.id+1);(t.subs||[]).forEach(s=>nid=Math.max(nid,s.id+1));});

let col={am:false,pm:false,night:false};
let wo=0,ws=0,wt=0,wti=0,wp=0,wraf=null,frozen=false,shards=[];
let actx=null,reverbNode=null,masterReverb=null;
let bgNodes=[],bgPlaying=false,musicMuted=false;
let msOpen=true;
let cgRaf=null;

function save(){localStorage.setItem(LS_TASKS,JSON.stringify(tasks));localStorage.setItem(LS_DONE,JSON.stringify(done));}
function saveMindset(){const v=[...document.querySelectorAll('.mindset-input')].map(e=>e.value);localStorage.setItem(LS_MINDSET,JSON.stringify(v));}
function loadMindset(){const v=JSON.parse(localStorage.getItem(LS_MINDSET)||'[]');document.querySelectorAll('.mindset-input').forEach((e,i)=>{if(v[i])e.value=v[i];autoResize(e);});}

if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js'));

document.getElementById('dl').textContent=(()=>{const n=new Date();return n.getFullYear()+'年'+(n.getMonth()+1)+'月'+n.getDate()+'日（'+'日月火水木金土'[n.getDay()]+'）';})();

// ── Audio Context ─────────────────────────────
function gc(){
  if(!actx)try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}
  if(actx.state==='suspended')actx.resume();
  if(!reverbNode)reverbNode=mkReverb(actx,3.5,1.8);
  if(!masterReverb){masterReverb=actx.createGain();masterReverb.gain.value=1;masterReverb.connect(actx.destination);}
  if(!bgPlaying)startBgMusic();
  return actx;
}
document.addEventListener('touchstart',()=>gc(),{once:true});
document.addEventListener('click',()=>gc(),{once:true});

// ── Reverb ────────────────────────────────────
function mkReverb(c,dur=3,decay=2){
  const len=c.sampleRate*dur,buf=c.createBuffer(2,len,c.sampleRate);
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}
  const cv=c.createConvolver();cv.buffer=buf;return cv;
}

// ── Echo ──────────────────────────────────────
function mkEcho(c,dt=0.28,fb=0.38){
  const delay=c.createDelay(2);delay.delayTime.value=dt;
  const fbg=c.createGain();fbg.gain.value=fb;
  delay.connect(fbg);fbg.connect(delay);
  return delay;
}

// ── Healing BGM ───────────────────────────────
function startBgMusic(){
  const c=gc();if(!c||bgPlaying)return;bgPlaying=true;
  const rv=mkReverb(c,5,1.2);
  const master=c.createGain();master.gain.value=musicMuted?0:0.28;
  rv.connect(master);master.connect(c.destination);
  bgNodes=[rv,master];

  // ドローン（ヒーリング周波数 174Hz・261Hz）
  [[174,0.07],[174.6,0.06],[261.6,0.04],[523.2,0.025]].forEach(([f,g])=>{
    const o=c.createOscillator(),gn=c.createGain(),lfo=c.createOscillator(),lg=c.createGain();
    o.type='sine';o.frequency.value=f;
    lfo.frequency.value=0.08+Math.random()*0.06;lg.gain.value=f*0.003;
    lfo.connect(lg);lg.connect(o.frequency);
    gn.gain.value=g;o.connect(gn);gn.connect(rv);
    lfo.start();o.start();bgNodes.push(o,lfo);
  });

  // 風ノイズ
  const nb=c.createBuffer(1,c.sampleRate*3,c.sampleRate),nd=nb.getChannelData(0);
  for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
  const ns=c.createBufferSource();ns.buffer=nb;ns.loop=true;
  const bf=c.createBiquadFilter();bf.type='bandpass';bf.frequency.value=320;bf.Q.value=0.4;
  const ng=c.createGain();ng.gain.value=0.012;
  ns.connect(bf);bf.connect(ng);ng.connect(rv);ns.start();bgNodes.push(ns);

  // 水のせせらぎ（高周波ノイズ）
  const wb=c.createBuffer(1,c.sampleRate*2,c.sampleRate),wd=wb.getChannelData(0);
  for(let i=0;i<wd.length;i++)wd[i]=Math.random()*2-1;
  const ws2=c.createBufferSource();ws2.buffer=wb;ws2.loop=true;
  const wf=c.createBiquadFilter();wf.type='highpass';wf.frequency.value=2800;wf.Q.value=0.3;
  const wg=c.createGain();wg.gain.value=0.008;
  ws2.connect(wf);wf.connect(wg);wg.connect(rv);ws2.start();bgNodes.push(ws2);

  // シンギングボウル（ペンタトニック）
  const notes=[261.6,293.7,329.6,392,440,523.2,587.3,659.3];
  function bell(){
    if(!bgPlaying)return;
    const t=c.currentTime,f=notes[Math.floor(Math.random()*notes.length)];
    [1,2,3].forEach((h,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.type='sine';o.frequency.value=f*h*(1+i*0.001);
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.09/(i+1),t+0.015);
      g.gain.exponentialRampToValueAtTime(0.001,t+3.5+i*0.5);
      o.connect(g);g.connect(rv);o.start(t);o.stop(t+4+i*0.5);
    });
    setTimeout(bell,(2.5+Math.random()*5)*1000);
  }
  bell();

  // 鳥の声（合成）
  function bird(){
    if(!bgPlaying)return;
    const t=c.currentTime,chirps=2+Math.floor(Math.random()*3);
    for(let i=0;i<chirps;i++){
      const o=c.createOscillator(),g=c.createGain();
      const baseF=2200+Math.random()*1400,d=i*0.12;
      o.type='sine';
      o.frequency.setValueAtTime(baseF,t+d);
      o.frequency.exponentialRampToValueAtTime(baseF*1.4,t+d+0.06);
      o.frequency.exponentialRampToValueAtTime(baseF*0.9,t+d+0.12);
      g.gain.setValueAtTime(0,t+d);
      g.gain.linearRampToValueAtTime(0.06,t+d+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+d+0.14);
      o.connect(g);g.connect(rv);o.start(t+d);o.stop(t+d+0.2);
    }
    setTimeout(bird,(6+Math.random()*12)*1000);
  }
  bird();

  window._bgMaster=master;
}

function toggleMusic(){
  musicMuted=!musicMuted;
  document.getElementById('musicBtn').classList.toggle('muted',musicMuted);
  if(window._bgMaster)window._bgMaster.gain.setTargetAtTime(musicMuted?0:0.28,actx.currentTime,0.3);
}

// ── Sound Effects ─────────────────────────────
function playCrack(n){
  const c=gc();if(!c)return;
  const t=c.currentTime,iv=n/4,rv=mkReverb(c,1.2,2.5),echo=mkEcho(c,0.18,0.35);
  const out=c.createGain();out.gain.value=1.1;
  rv.connect(echo);echo.connect(out);out.connect(c.destination);
  [2400,3600,5000,1800,6500].forEach((f,i)=>{

// ── Water / Wave ──────────────────────────────
function allT(){return[...tasks.am,...tasks.pm,...tasks.night];}
function tot(){return allT().length+done.length;}
function pct(t){if(!t.subs||!t.subs.length)return t.done?100:0;return Math.round(t.subs.filter(s=>s.done).length/t.subs.length*100);}
function ft(bk,id){return tasks[bk]?tasks[bk].find(t=>t.id===id):null;}
function shH(){return shards.length?Math.max(...shards.map(s=>s.ry+s.sh)):0;}
function wPct(){const t=tot();return t?done.length/t:0;}

function updW(){
  if(frozen)return;
  const p=wPct(),vh=window.innerHeight,sh2=shH();
  const h=Math.max(0,Math.round(p*vh)-sh2);
  document.getElementById('wl').style.height=h+'px';
  const cv=document.getElementById('wc');cv.width=cv.offsetWidth||390;cv.height=Math.max(h,1);
  if(wraf)cancelAnimationFrame(wraf);
  if(p>0&&h>0)wave(cv);
  if(p>=1&&!frozen)setTimeout(freeze,500);
}

function wave(cv){
  function fr(){
    if(frozen)return;
    wo+=.025;wti--;
    if(wti<=0){wt=(Math.random()-.5)*20;wti=80+Math.random()*140|0;}
    ws+=(wt-ws)*.018;wp+=.007;
    const w=cv.width,h=cv.height,ctx=cv.getContext('2d');
    ctx.clearRect(0,0,w,h);
    const g=ctx.createLinearGradient(0,0,0,h);
    g.addColorStop(0,'rgba(159,214,221,.52)');g.addColorStop(.4,'rgba(184,234,242,.48)');g.addColorStop(1,'rgba(215,251,255,.62)');
    ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(0,h);
    for(let x=0;x<=w;x++){const y=8*Math.sin((x/w)*Math.PI*2+wo)+5*Math.sin((x/w)*Math.PI*3+wo*1.4)+ws*Math.sin((x/w)*Math.PI+wp)*.9+14;ctx.lineTo(x,y);}
    ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=1;
    for(let i=0;i<3;i++){
      ctx.beginPath();const yb=h*.15+i*h*.28;
      for(let x=0;x<=w;x++){const y=yb+3*Math.sin((x/w)*Math.PI*4+wo*1.2+i*1.1)+ws*.3*Math.sin((x/w)*Math.PI*2+wp+i);x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
      ctx.stroke();
    }
    wraf=requestAnimationFrame(fr);
  }
  wraf=requestAnimationFrame(fr);
}

function freeze(){
  frozen=true;cancelAnimationFrame(wraf);
  const cv=document.getElementById('wc'),ctx=cv.getContext('2d'),w=cv.width,h=cv.height;
  ctx.clearRect(0,0,w,h);
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'rgba(159,214,221,.72)');g.addColorStop(1,'rgba(215,251,255,.85)');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  const ic=document.getElementById('ic');ic.width=window.innerWidth;ic.height=window.innerHeight;
  drawIce(ic);ic.style.opacity='1';
  document.getElementById('ibl').style.display='block';
  document.getElementById('shbtn').style.display='block';
}

function drawIce(cv){
  const ctx=cv.getContext('2d'),w=cv.width,h=cv.height;
  const g=ctx.createLinearGradient(0,0,w,h);
  g.addColorStop(0,'rgba(215,251,255,.82)');g.addColorStop(.5,'rgba(184,234,242,.74)');g.addColorStop(1,'rgba(159,214,221,.86)');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(255,255,255,.72)';ctx.lineWidth=1;
  for(let i=0;i<55;i++){
    const ox=Math.random()*w,oy=Math.random()*h,br=3+Math.random()*4|0;
    for(let b=0;b<br;b++){
      const a=(b/br)*Math.PI*2+Math.random()*.4,l=15+Math.random()*95;
      ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+Math.cos(a)*l,oy+Math.sin(a)*l);ctx.stroke();
      for(let s=0;s<3;s++){
        const sf=.25+s*.25,sa=a+(Math.random()-.5)*1.4;
        ctx.beginPath();ctx.moveTo(ox+Math.cos(a)*l*sf,oy+Math.sin(a)*l*sf);ctx.lineTo(ox+Math.cos(a)*l*sf+Math.cos(sa)*l*.35,oy+Math.sin(a)*l*sf+Math.sin(sa)*l*.35);ctx.stroke();
      }
    }
  }
}

function drawSK(){
  const cv=document.getElementById('sk'),w=window.innerWidth;
  if(!shards.length){cv.style.height='0';return;}
  const maxH=Math.max(...shards.map(s=>s.ry+s.sh))+10;
  cv.width=w;cv.height=maxH;cv.style.height=maxH+'px';
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,w,maxH);
  shards.forEach(s=>{
    ctx.save();ctx.translate(s.rx+s.sw/2,s.ry+s.sh/2);ctx.rotate(s.rr);
    ctx.fillStyle=s.col;ctx.beginPath();
    s.pts.forEach((p,i)=>i?ctx.lineTo(p[0]-s.sw/2,p[1]-s.sh/2):ctx.moveTo(p[0]-s.sw/2,p[1]-s.sh/2));
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=.7;
    for(let i=0;i<2;i++){const lx=(Math.random()-.5)*s.sw,ly=(Math.random()-.5)*s.sh,la=Math.random()*Math.PI;ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+Math.cos(la)*s.sw*.4,ly+Math.sin(la)*s.sh*.3);ctx.stroke();}
    ctx.restore();
  });
}

function shatterIce(){

    aS.push({el,x,y,ox:x,oy:y,sw,sh,vx:(Math.random()-.5)*20,vy:-(6+Math.random()*18),rot:(Math.random()-.5)*1000,rv:(Math.random()-.5)*24,op:1,pts,col:c});
  }

  function anim(){
    let alive=false;
    aS.forEach(s=>{
      s.vy+=.55;s.x+=s.vx;s.y+=s.vy;s.rot+=s.rv;s.op-=.009;
      if(s.op>0){alive=true;s.el.style.transform=`translate(${s.x-s.ox}px,${s.y-s.oy}px) rotate(${s.rot}deg)`;s.el.style.opacity=s.op;}
      else s.el.style.display='none';
    });
    if(alive){requestAnimationFrame(anim);}
    else{
      sl.style.display='none';sl.innerHTML='';frozen=false;ic.style.opacity='0';

// ── Congratulations ───────────────────────────
function showCongrats(){
  const el=document.getElementById('congrats');
  el.style.display='flex';
  // 雪の結晶が降るアニメ
  const cv=document.getElementById('congrats-canvas');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const ctx=cv.getContext('2d');
  const flakes=Array.from({length:60},()=>({
    x:Math.random()*cv.width,y:Math.random()*cv.height,
    r:2+Math.random()*4,v:0.4+Math.random()*1.2,
    a:Math.random()*Math.PI*2,drift:(Math.random()-.5)*0.5,op:0.5+Math.random()*0.5
  }));
  function drawFlake(ctx,x,y,r){
    for(let i=0;i<6;i++){
      ctx.save();ctx.translate(x,y);ctx.rotate(i*Math.PI/3);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,r);
      ctx.moveTo(0,r*.4);ctx.lineTo(r*.25,r*.6);
      ctx.moveTo(0,r*.4);ctx.lineTo(-r*.25,r*.6);
      ctx.stroke();ctx.restore();
    }
  }
  function animFlakes(){
    cgRaf=requestAnimationFrame(animFlakes);
    ctx.clearRect(0,0,cv.width,cv.height);
    // 積もった氷のイメージ（下部）
    const g=ctx.createLinearGradient(0,cv.height*.7,0,cv.height);
    g.addColorStop(0,'rgba(159,214,221,0)');g.addColorStop(1,'rgba(184,234,242,.6)');
    ctx.fillStyle=g;ctx.fillRect(0,cv.height*.7,cv.width,cv.height*.3);
    // 氷の結晶線
    ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=1;
    flakes.forEach(f=>{
      f.y+=f.v;f.x+=f.drift;f.a+=0.005;
      if(f.y>cv.height){f.y=-10;f.x=Math.random()*cv.width;}
      if(f.x<0)f.x=cv.width;if(f.x>cv.width)f.x=0;
      ctx.save();ctx.globalAlpha=f.op;drawFlake(ctx,f.x,f.y,f.r);ctx.restore();
    });
  }
  animFlakes();
  // お祝い音
  playCongratsSound();
}

// ── crack lines ───────────────────────────────
function clines(iv){
  const ls=[],or=[[114,24],[228,14],[57,29]],cnt=3+iv*9|0;
  for(let i=0;i<cnt;i++){
    const ox=or[i%3][0]+(Math.random()-.5)*60,oy=or[i%3][1]+(Math.random()-.5)*20;
    const a=Math.random()*Math.PI*2,l=20+Math.random()*65*iv;
    const ex=ox+Math.cos(a)*l,ey=oy+Math.sin(a)*l,mx=ox+Math.cos(a)*l*.5+(Math.random()-.5)*15,my=oy+Math.sin(a)*l*.5+(Math.random()-.5)*10;
    ls.push(`<path d="M${ox},${oy} Q${mx},${my} ${ex},${ey}" stroke="#0A8FA3" stroke-width="${.8+iv*1.2}" fill="none" opacity="${.35+iv*.45}"/>`);
    if(iv>.3&&Math.random()>.5){const a2=a+.8+(Math.random()-.5)*1,l2=10+Math.random()*35*iv;ls.push(`<path d="M${mx},${my} L${mx+Math.cos(a2)*l2},${my+Math.sin(a2)*l2}" stroke="#0A8FA3" stroke-width=".7" fill="none" opacity="${.2+iv*.35}"/>`);}
  }
  return ls.join('');
}

// ── Task logic ────────────────────────────────
function tap(bk,id){
  const t=ft(bk,id);if(!t)return;
  const hs=t.subs&&t.subs.length;
  if(hs&&!t.subs.every(s=>s.done))return;
  if(!hs&&!t.done)return;
  t.cr=Math.min((t.cr||0)+1,4);
  if(t.cr<4){playCrack(t.cr);save();rb();}
  else{
    playSmash();
    const el=document.querySelector(`.tr[data-id="${id}"]`);
    if(el){el.style.transition='transform .35s cubic-bezier(.55,-.5,.7,1),opacity .35s';el.style.transform='translateY(20px) scale(.93)';el.style.opacity='0';setTimeout(()=>{tasks[bk]=tasks[bk].filter(t=>t.id!==id);done.push({...t});save();ra();updW();},340);}
    else{tasks[bk]=tasks[bk].filter(t=>t.id!==id);done.push({...t});save();ra();updW();}
  }
}

function ra(){rb();rd();}

        const csv=cv?`<svg style="position:absolute;inset:0;pointer-events:none;z-index:2;" width="100%" height="100%" viewBox="0 0 380 56" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">${clines(iv)}</svg>`:'';

function rd(){
  const dz=document.getElementById('dz'),dp=document.getElementById('dp');
  if(!done.length){dz.style.display='none';return;}
  dz.style.display='block';const t=tot();
  document.getElementById('dzt').textContent=`✅ 完了済み ${done.length} / ${t}`;
  document.getElementById('dzs').textContent=`今日の達成率 ${Math.round(done.length/t*100)}%`;
  dp.innerHTML=done.map(t=>`<div class="dc" style="background:${Q[t.q].c};"><span style="font-size:22px;">❄️</span><span class="dct">${t.text}</span><span class="bg ${Q[t.q].b}">${Q[t.q].l}</span></div>`).join('');
}

function tgO(bk,id){const t=ft(bk,id);if(t)t.open=!t.open;save();rb();}
function tgT(bk,id){const t=ft(bk,id);if(!t)return;if(t.subs&&t.subs.length){const a=t.subs.every(s=>s.done);t.subs.forEach(s=>s.done=!a);t.done=!a;}else t.done=!t.done;save();ra();}
function dlT(bk,id){tasks[bk]=tasks[bk].filter(t=>t.id!==id);save();ra();updW();}
function addT(bk){const i=document.getElementById('inp-'+bk),s=document.getElementById('sel-'+bk),tx=i.value.trim();if(!tx)return;tasks[bk].push({id:nid++,text:tx,q:parseInt(s.value),done:false,open:false,cr:0,subs:[]});i.value='';save();ra();updW();}
function tgS(bk,tid,sid){const t=ft(bk,tid);if(!t)return;const s=t.subs.find(s=>s.id===sid);if(s)s.done=!s.done;t.done=t.subs.every(s=>s.done);save();ra();}
function dlS(bk,tid,sid){const t=ft(bk,tid);if(!t)return;t.subs=t.subs.filter(s=>s.id!==sid);save();ra();}
function addS(bk,tid){const i=document.getElementById('si-'+tid),tx=i.value.trim();if(!tx)return;const t=ft(bk,tid);if(!t)return;t.subs.push({id:nid++,text:tx,done:false});i.value='';save();ra();}
function tgCol(k){col[k]=!col[k];rb();}
function toggleMindset(){msOpen=!msOpen;document.getElementById('ms-cards').style.display=msOpen?'grid':'none';document.getElementById('ms-toggle').textContent=msOpen?'▲ 閉じる':'▼ 開く';}
function autoResize(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}

const Q=[{l:'重要・急ぎ',b:'br',c:'#FDECEA'},{l:'重要・後で',b:'ba2',c:'#FEF3E2'},{l:'急ぎ・軽め',b:'bb',c:'#E3F4F8'},{l:'いつか',b:'bg2',c:'#EDF8FA'}];
const BL=[{k:'am',i:'🌅',n:'午前',t:'〜12:00'},{k:'pm',i:'☀️',n:'午後',t:'12:00〜18:00'},{k:'night',i:'🌙',n:'夜',t:'18:00〜'}];

function drag(bk){
  const list=document.getElementById('list-'+bk);if(!list)return;
  list.querySelectorAll('.tr').forEach(row=>{
    const h=row.querySelector('.dh');if(!h)return;
    h.addEventListener('mousedown',e=>{e.stopPropagation();sd(e,row,bk,false);});
    h.addEventListener('touchstart',e=>{e.stopPropagation();sd(e,row,bk,true);},{passive:false});
  });
}
function sd(e,row,bk,isT){
  e.preventDefault();const id=parseInt(row.dataset.id);row.classList.add('dragging');
  const mv=isT?'touchmove':'mousemove',up=isT?'touchend':'mouseup';
  function onM(ev){const y=isT?ev.touches[0].clientY:ev.clientY;const l=document.getElementById('list-'+bk);if(!l)return;const sb=[...l.querySelectorAll('.tr:not(.dragging)')];sb.forEach(s=>s.classList.remove('drag-over'));for(const s of sb){const r=s.getBoundingClientRect();if(y<r.top+r.height/2){s.classList.add('drag-over');break;}}}
  function onU(){document.removeEventListener(mv,onM);document.removeEventListener(up,onU);row.classList.remove('dragging');const l=document.getElementById('list-'+bk);if(l){const sb=[...l.querySelectorAll('.tr:not(.dragging)')],ov=sb.find(s=>s.classList.contains('drag-over'));sb.forEach(s=>s.classList.remove('drag-over'));const arr=tasks[bk],fi=arr.findIndex(t=>t.id===id);if(ov){const ti=arr.findIndex(t=>t.id===parseInt(ov.dataset.id));if(fi!==-1&&ti!==-1&&fi!==ti){const[item]=arr.splice(fi,1);arr.splice(ti,0,item);}}}save();ra();}
  document.addEventListener(mv,onM);document.addEventListener(up,onU);
}

window.addEventListener('resize',()=>{if(!frozen)updW();drawSK();});
ra();updW();drawSK();loadMindset();
</script>
